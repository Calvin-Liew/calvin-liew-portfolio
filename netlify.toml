[build]
  # Build command for Next.js. The publish directory and routing are handled
  # automatically by the Netlify Next.js Runtime plugin, which Netlify
  # auto-installs when it detects a Next.js project. Do NOT set publish=".next"
  # here, and do NOT add a catch-all rewrite to /index.html — that breaks
  # static-asset serving (every /projects/*.png ends up returning index.html).
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20.11.0"
  NEXT_TELEMETRY_DISABLED = "1"

# Security and performance headers for every response.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
